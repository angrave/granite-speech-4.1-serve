# Granite Speech 4.1-2B — three OpenAI-compatible STT endpoints.
#
# Usage:
#   cp .env.example .env          # set LLAMA_API_KEY and GRANITE_API_KEY
#   docker compose up --build
#
# Endpoints (accessible from host):
#   http://localhost:$GRANITE_BASE_DIRECT_PORT  — base model proxy (chunking → llama-server on :$GRANITE_BASE_PROXY_PORT)
#   http://localhost:$GRANITE_PLUS_DIRECT_PORT  — plus model proxy (chunking, timestamps, speaker stitching)
#   http://localhost:$GRANITE_NAR_DIRECT_PORT   — NAR model  (FastAPI, bfloat16)
#
# Internal (Docker network only, not exposed to clients):
#   http://llama-base:$GRANITE_BASE_PROXY_PORT   — llama-server (base model backend)
#   http://granite-plus:$GRANITE_PLUS_PROXY_PORT — plus model backend (loaded via PyTorch)
#
# All endpoints serve POST /v1/audio/transcriptions (OpenAI-compatible).
# GET /health requires no auth.
#
# Note: MPS is unavailable inside Docker (Linux VM).
# For CUDA on Linux, layer in docker-compose.gpu.yml — or use start_local_docker.sh
# which detects an NVIDIA GPU automatically.

services:

  # ── Backend 1a: llama.cpp server (base model, Q8_0 GGUF) — internal ────────
  # Note: llama.cpp images are linux/amd64 only — no arm64 build is published.
  # On Apple Silicon, run granite-base natively instead:
  #   llama-server -hf ibm-granite/granite-speech-4.1-2b-GGUF:Q8_0 \
  #     --port $GRANITE_BASE_PROXY_PORT --host 127.0.0.1 --api-key $LLAMA_API_KEY
  # To force Rosetta emulation on Apple Silicon, add: platform: linux/amd64
  llama-base:
    profiles: [base]
    image: ghcr.io/ggml-org/llama.cpp:server-b9644
    platform: linux/amd64
    command: >
      -hf ibm-granite/granite-speech-4.1-2b-GGUF:Q8_0
      --port ${GRANITE_BASE_PROXY_PORT:-18700}
      --host 0.0.0.0
      --api-key ${LLAMA_API_KEY:-}
    environment:
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
      - llama_cache:/root/.cache/llama.cpp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${GRANITE_BASE_PROXY_PORT:-18700}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── Backend 1b (proxy): chunking proxy for the base model ─────────────────
  # Public-facing on :$GRANITE_BASE_DIRECT_PORT.  Splits long audio into ≤14 s chunks, forwards
  # each to the internal llama-server, and stitches results.
  granite-base:
    profiles: [base]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    command: uvicorn serve_base:app --host 0.0.0.0 --port ${GRANITE_BASE_DIRECT_PORT:-8700}
    ports:
      - "127.0.0.1:${GRANITE_BASE_DIRECT_PORT:-8700}:${GRANITE_BASE_DIRECT_PORT:-8700}"
    environment:
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - LLAMA_INTERNAL_URL=http://llama-base:${GRANITE_BASE_PROXY_PORT:-18700}/v1/audio/transcriptions
      - LLAMA_HEALTH_URL=http://llama-base:${GRANITE_BASE_PROXY_PORT:-18700}/health
    depends_on:
      llama-base:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${GRANITE_BASE_DIRECT_PORT:-8700}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Backend 2a: plus model (autoregressive, speaker diarisation) ──────────
  # Internal service — not exposed to the host.  The proxy below ($GRANITE_PLUS_DIRECT_PORT) is
  # the public-facing endpoint.  Reachable within the Docker network as
  # http://granite-plus:$GRANITE_PLUS_PROXY_PORT.
  granite-plus:
    profiles: [plus]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    command: uvicorn serve_plus:app --host 0.0.0.0 --port ${GRANITE_PLUS_PROXY_PORT:-18701}
    environment:
      - GRANITE_API_KEY=${GRANITE_API_KEY:-}
      - PLUS_MAX_NEW_TOKENS=${PLUS_MAX_NEW_TOKENS:-4096}
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/cache/huggingface
    volumes:
      - hf_cache:/cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${GRANITE_PLUS_PROXY_PORT:-18701}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ── Backend 2a (proxy): chunking proxy for the plus model ─────────────────
  # Public-facing on :$GRANITE_PLUS_DIRECT_PORT.  Splits long audio into ≤14 s chunks, forwards
  # each to the internal plus model, and stitches results — unwrapping
  # [T:N] timestamps and remapping [Speaker N]: labels across chunk boundaries.
  granite-plus-proxy:
    profiles: [plus]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    command: uvicorn serve_plus_proxy:app --host 0.0.0.0 --port ${GRANITE_PLUS_DIRECT_PORT:-8701}
    ports:
      - "127.0.0.1:${GRANITE_PLUS_DIRECT_PORT:-8701}:${GRANITE_PLUS_DIRECT_PORT:-8701}"
    environment:
      - GRANITE_API_KEY=${GRANITE_API_KEY:-}
      - PLUS_INTERNAL_URL=http://granite-plus:${GRANITE_PLUS_PROXY_PORT:-18701}/v1/audio/transcriptions
      - PLUS_INTERNAL_HEALTH_URL=http://granite-plus:${GRANITE_PLUS_PROXY_PORT:-18701}/health
    depends_on:
      granite-plus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${GRANITE_PLUS_DIRECT_PORT:-8701}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Backend 2b: NAR model (non-autoregressive, fastest) ──────────────────
  granite-nar:
    profiles: [nar]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    command: uvicorn serve_nar:app --host 0.0.0.0 --port ${GRANITE_NAR_DIRECT_PORT:-8702}
    ports:
      - "127.0.0.1:${GRANITE_NAR_DIRECT_PORT:-8702}:${GRANITE_NAR_DIRECT_PORT:-8702}"
    environment:
      - GRANITE_API_KEY=${GRANITE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/cache/huggingface
      - GRANITE_NAR_DEVICE=${GRANITE_NAR_DEVICE:-}
    volumes:
      - hf_cache:/cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${GRANITE_NAR_DIRECT_PORT:-8702}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  # Shared HuggingFace model cache — models download once and persist across restarts.
  hf_cache:
  # llama.cpp model cache (base model GGUF).
  llama_cache:

# ── CUDA / GPU notes ─────────────────────────────────────────────────────────
# To use NVIDIA GPUs on Linux:
# 1. Install nvidia-container-toolkit on the host.
# 2. Add to granite-plus and granite-nar services:
#      deploy:
#        resources:
#          reservations:
#            devices:
#              - driver: nvidia
#                count: 1
#                capabilities: [gpu]
# 3. Switch granite-plus and granite-nar to the pre-built CUDA image:
#      image: ghcr.io/angrave/granite-speech-4.1-serve:cuda
#    (remove the build: block — the :cuda image is published by CI with cu124 wheels)
#    Alternatively, keep build: and pass the CUDA wheel index as a build arg:
#      build:
#        context: .
#        dockerfile: Dockerfile
#        args:
#          PYTORCH_INDEX_URL: https://download.pytorch.org/whl/cu124
# 4. For the llama-base service use the CUDA image instead:
#      image: ghcr.io/ggml-org/llama.cpp:server-cuda-b9644
#    and add the same deploy.resources block.
