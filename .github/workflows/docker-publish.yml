name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build one image per (variant × platform) on a native runner ──────────────
  build:
    name: Build ${{ matrix.variant }}/${{ matrix.platform-slug }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU builds — multi-arch manifest becomes :latest
          - runner: ubuntu-latest
            platform: linux/amd64
            platform-slug: amd64
            variant: cpu
            pytorch-index: https://download.pytorch.org/whl/cpu
            pytorch-version: "2.6.0"

          # arm64: pytorch.org/whl only publishes up to 2.5.1 for this arch
          - runner: ubuntu-22.04-arm
            platform: linux/arm64
            platform-slug: arm64
            variant: cpu
            pytorch-index: https://download.pytorch.org/whl/cpu
            pytorch-version: "2.5.1"

          # CUDA 12.4 builds — multi-arch manifest becomes :cuda
          # amd64: standard NVIDIA GPU servers
          # arm64: NVIDIA Spark G10 (GB10 Grace-Blackwell), GH200, Jetson Orin, etc.
          - runner: ubuntu-latest
            platform: linux/amd64
            platform-slug: amd64
            variant: cuda
            pytorch-index: https://download.pytorch.org/whl/cu124
            pytorch-version: "2.6.0"

          # arm64: pytorch.org/whl only publishes up to 2.5.1 for this arch
          - runner: ubuntu-22.04-arm
            platform: linux/arm64
            platform-slug: arm64
            variant: cuda
            pytorch-index: https://download.pytorch.org/whl/cu124
            pytorch-version: "2.5.1"

          # CUDA 12.8 builds — multi-arch manifest becomes :cuda128
          # Required for Blackwell GPUs (RTX 5000 series, GB200, etc.).
          # Both amd64 and arm64 wheels are published at this CUDA level.
          - runner: ubuntu-latest
            platform: linux/amd64
            platform-slug: amd64
            variant: cuda128
            pytorch-index: https://download.pytorch.org/whl/cu128
            pytorch-version: "2.11.0"

          - runner: ubuntu-22.04-arm
            platform: linux/arm64
            platform-slug: arm64
            variant: cuda128
            pytorch-index: https://download.pytorch.org/whl/cu128
            pytorch-version: "2.11.0"

          # CUDA 13.0 builds — multi-arch manifest becomes :cuda130
          # For next-generation GPU architectures beyond Blackwell.
          # pytorch.org/whl does not publish cu130 arm64 torch wheels yet.
          - runner: ubuntu-latest
            platform: linux/amd64
            platform-slug: amd64
            variant: cuda130
            pytorch-index: https://download.pytorch.org/whl/cu130
            pytorch-version: "2.11.0"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PYTORCH_INDEX_URL=${{ matrix.pytorch-index }}
            PYTORCH_VERSION=${{ matrix.pytorch-version }}
          # Push individual digest (no tag yet); merge job creates the manifest.
          outputs: >-
            type=image,
            name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},
            push-by-digest=true,
            name-canonical=true,
            push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.platform-slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.platform-slug }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.platform-slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into a multi-arch manifest ────────────────────
  merge:
    name: Merge ${{ matrix.variant }} manifest
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - variant: cpu
            tag: latest
            has-arm64: true
          - variant: cuda
            tag: cuda
            has-arm64: true
          - variant: cuda128
            tag: cuda128
            has-arm64: true
          - variant: cuda130
            tag: cuda130
            has-arm64: false

    steps:
      - name: Download digests (${{ matrix.variant }}/amd64)
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-amd64
          path: /tmp/digests

      - name: Download digests (${{ matrix.variant }}/arm64)
        if: matrix.has-arm64
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-arm64
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=sha,prefix=${{ matrix.tag }}-

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
