# Granite Speech 4.1-2B — deploy with pre-built CUDA images (no local build required).
#
# Usage:
#   export GRANITE_API_KEY=your-secret-key   # optional; omit to disable auth
#   export LLAMA_API_KEY=your-secret-key     # optional; omit to disable auth
#   export HF_TOKEN=your-hf-token           # required to download gated models
#   docker compose -f docker-compose-deploy.yml up
#
# Requires: nvidia-container-toolkit installed on the host for GPU passthrough.
#
# Endpoints:
#   http://localhost:9797  — base model (llama.cpp, Q8_0 GGUF)
#   http://localhost:8001  — plus model (FastAPI, bfloat16, timestamps + diarization)
#   http://localhost:8002  — NAR model  (FastAPI, bfloat16, fastest)

services:

  granite-base:
    # image: ghcr.io/ggerganov/llama.cpp:server-0f6135270839f0715843c4d480c63ae150def419-cuda
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    platform: linux/amd64
    command: >
      -hf ibm-granite/granite-speech-4.1-2b-GGUF:Q8_0
      --port 9797
      --host 0.0.0.0
      --api-key ${LLAMA_API_KEY:-}
    ports:
      - "127.0.0.1:9797:9797"
    environment:
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
      - llama_cache:/root/.cache/llama.cpp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9797/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  granite-plus:
    image: ghcr.io/angrave/granite-speech-4.1-serve:cuda
    command: uvicorn serve_plus:app --host 0.0.0.0 --port 8001
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - GRANITE_API_KEY=${GRANITE_API_KEY:-}
      - HF_HOME=/cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf_cache:/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  granite-nar:
    image: ghcr.io/angrave/granite-speech-4.1-serve:cuda
    command: uvicorn serve_nar:app --host 0.0.0.0 --port 8002
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - GRANITE_API_KEY=${GRANITE_API_KEY:-}
      - HF_HOME=/cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf_cache:/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  hf_cache:
  llama_cache:
