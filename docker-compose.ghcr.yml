# Override to use pre-built ghcr.io images instead of building locally.
# Layer on top of docker-compose.yml (and docker-compose.gpu.yml for GPU).
# Used by start_ghcr.sh — do not use standalone.
#
# GHCR_TAG is set by start_ghcr.sh:  latest (CPU)  or  cuda (NVIDIA GPU)

services:
  granite-plus:
    image: ghcr.io/angrave/granite-speech-4.1-serve:${GHCR_TAG:-latest}

  granite-nar:
    image: ghcr.io/angrave/granite-speech-4.1-serve:${GHCR_TAG:-latest}
